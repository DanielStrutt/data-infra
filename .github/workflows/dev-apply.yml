name: Dev — Terraform Apply

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "apply" to confirm you want to apply to dev'
        required: true

permissions:
  contents: read

jobs:
  apply:
    name: Terraform Apply (dev)
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm != 'apply' }}
        run: |
          echo "Confirmation input was not 'apply'. Aborting."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-west-2

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=data-infra/dev/terraform.tfstate"

      # Re-run plan immediately before apply so you apply exactly what was planned
      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="envs/dev/terraform.tfvars" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
