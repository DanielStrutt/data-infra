name: Prod — Terraform Plan (PR check)

on:
  pull_request:
    branches:
      - main

permissions:
  contents:      read
  pull-requests: write   # needed to post plan as a PR comment

jobs:
  plan:
    name: Terraform Plan (prod)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1"
          terraform_wrapper: true   # enables terraform output capture for PR comment

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-west-2

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="key=data-infra/prod/terraform.tfstate"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="envs/prod/terraform.tfvars" \
            -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true   # post the comment even if plan fails

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;

            const body = `## Terraform Plan — prod 🚀
            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`
            </details>

            **Plan exit code:** \`${{ steps.plan.outcome }}\`
            > Merge this PR to trigger \`prod-apply\`.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
